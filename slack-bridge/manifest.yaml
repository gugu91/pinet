display_information:
  name: Pinet
  description: Hi, im Pinet (pronounce pie-net like apple-pie and basketball net)
  background_color: "#87390c"
  long_description: "I am a friendly one and I can wear many hats at once, ask me anything! In my free time I like to take long walks in the park and bring a picnic. My favorite food is pie of course :cake:"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Pinet
    always_online: true
  # Default packaged command for the Pinet app. For Oathgate or another app name,
  # either edit this command before manual Slack import or run `pnpm deploy:slack`
  # with slackCommandName/slackCommandNames configured so deployment rewrites it.
  slash_commands:
    - command: /pinet
      description: Show the Pinet broker roster and current work
      usage_hint: "agents list [all]"
      should_escape: false
  assistant_view:
    assistant_description: Pi coding agent
    suggested_prompts: []
oauth_config:
  scopes:
    bot:
      - reactions:write
      - app_mentions:read
      - assistant:write
      - channels:history
      - channels:read
      - chat:write
      - commands
      - files:read
      - files:write
      - bookmarks:read
      - bookmarks:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - reactions:read
      - canvases:read
      - canvases:write
      - pins:read
      - pins:write
  pkce_enabled: false
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - app_home_opened
      - assistant_thread_started
      - assistant_thread_context_changed
      - reaction_added
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
