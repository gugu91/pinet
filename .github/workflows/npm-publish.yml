name: Publish npm packages

run-name: npm ${{ inputs.dry_run && 'dry-run' || 'publish' }} all packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run only"
        required: true
        type: boolean
        default: true
      release_approval:
        description: "For real publishes only: type 'publish all'"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ inputs.dry_run && 'dry-run' || 'live' }}
  cancel-in-progress: false

jobs:
  readiness:
    name: Validate npm publish readiness
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dry-run publish packages
        run: >-
          node ./scripts/publish-npm-packages.mjs
          --dry-run

  publish-preflight:
    name: Check real publish gates
    if: ${{ !inputs.dry_run }}
    needs: readiness
    runs-on: ubuntu-latest
    steps:
      - name: Guard real publish ref
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          echo "Real npm publishes must be dispatched from refs/heads/main. Current ref: $GITHUB_REF"
          exit 1

      - name: Guard real publish approval phrase
        env:
          RELEASE_APPROVAL: ${{ inputs.release_approval }}
        run: |
          expected="publish all"
          if [ "${RELEASE_APPROVAL}" != "${expected}" ]; then
            echo "Real npm publishes require release_approval exactly: ${expected}"
            exit 1
          fi

  publish:
    name: Publish npm packages
    if: ${{ !inputs.dry_run }}
    needs:
      - readiness
      - publish-preflight
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Trusted Publishing context
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "GitHub OIDC is required for npm Trusted Publishing. Check id-token: write and the npm-publish environment."
            exit 1
          fi

      - name: Publish packages
        run: >-
          node ./scripts/publish-npm-packages.mjs
          --publish
